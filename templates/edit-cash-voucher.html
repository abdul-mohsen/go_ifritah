{{ define "content" }}
{{ template "error-alert" . }}

<div class="page-header">
    <a href="/dashboard/cash-vouchers/{{ .id }}" class="btn btn-text btn-sm">&rarr; {{ L "cash_voucher.detail_title" }}</a>
</div>

<form hx-put="/api/cash-vouchers/{{ .id }}" hx-target="body" class="section-card" id="editVoucherForm">
    {{ template "form-errors" . }}
    <input type="hidden" name="csrf_token" value="{{ .csrf_token }}">

    <!-- Row 1: Type + Date + Amount -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="form-group">
            <label class="form-label">{{ L "cash_voucher.voucher_type" }} *</label>
            <select name="voucher_type" required class="form-select" id="voucher_type">
                <option value="disbursement" {{ if eq (index .voucher "voucher_type") "disbursement" }}selected{{ end }}>{{ L "cash_voucher_type.disbursement" }}</option>
                <option value="receipt" {{ if eq (index .voucher "voucher_type") "receipt" }}selected{{ end }}>{{ L "cash_voucher_type.receipt" }}</option>
                <option value="cash_box" {{ if eq (index .voucher "voucher_type") "cash_box" }}selected{{ end }}>{{ L "cash_voucher_type.cash_box" }}</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">{{ L "cash_voucher.effective_date" }} *</label>
            <input type="date" name="effective_date" required class="form-input" value="{{ .date }}">
        </div>
        <div class="form-group">
            <label class="form-label">{{ L "cash_voucher.amount" }} ({{ L "tpl.currency" }}) *</label>
            <input type="number" name="amount" required min="0.01" step="0.01" class="form-input" value="{{ .amount }}">
        </div>
    </div>

    <!-- Row 2: Payment + Store -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
        <div class="form-group">
            <label class="form-label">{{ L "cash_voucher.payment_method" }} *</label>
            <select name="payment_method" required class="form-select" id="payment_method" onchange="toggleBankFields()">
                <option value="cash" {{ if eq (index .voucher "payment_method") "cash" }}selected{{ end }}>{{ L "cash_voucher_method.cash" }}</option>
                <option value="bank_transfer" {{ if eq (index .voucher "payment_method") "bank_transfer" }}selected{{ end }}>{{ L "cash_voucher_method.bank_transfer" }}</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">{{ L "tpl.pb.store" }} *</label>
            <select name="store_id" required class="form-select">
                {{ $storeID := index .voucher "store_id" }}
                {{ range .stores }}
                <option value="{{ .ID }}" {{ if eq (printf "%v" .ID) (printf "%v" $storeID) }}selected{{ end }}>{{ .Name }}</option>
                {{ end }}
            </select>
        </div>
    </div>

    <!-- Row 3: Recipient -->
    <h4 class="section-card-title mt-6">{{ L "cash_voucher.recipient_type" }}</h4>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="form-group">
            <label class="form-label">{{ L "cash_voucher.recipient_type" }} *</label>
            <select name="recipient_type" required class="form-select" id="recipient_type" onchange="toggleRecipientFields()">
                {{ $recipientType := index .voucher "recipient_type" }}
                <option value="supplier" {{ if eq $recipientType "supplier" }}selected{{ end }}>{{ L "cash_voucher_recipient.supplier" }}</option>
                <option value="client" {{ if eq $recipientType "client" }}selected{{ end }}>{{ L "cash_voucher_recipient.client" }}</option>
                <option value="employee" {{ if eq $recipientType "employee" }}selected{{ end }}>{{ L "cash_voucher_recipient.employee" }}</option>
                <option value="other" {{ if eq $recipientType "other" }}selected{{ end }}>{{ L "cash_voucher_recipient.other" }}</option>
            </select>
        </div>
        <div class="form-group" id="supplier_select_group">
            <label class="form-label">{{ L "cash_voucher_recipient.supplier" }}</label>
            <select name="recipient_id" class="form-select" id="supplier_select" onchange="updateRecipientName(this)">
                <option value="">-- {{ L "tpl.select" }} --</option>
                {{ $recipientID := index .voucher "recipient_id" }}
                {{ range .suppliers }}
                <option value="{{ .ID }}" data-name="{{ .Name }}" {{ if eq (printf "%v" .ID) (printf "%v" $recipientID) }}selected{{ end }}>{{ .Name }}</option>
                {{ end }}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">{{ L "cash_voucher.recipient_name" }} *</label>
            <input type="text" name="recipient_name" required class="form-input" id="recipient_name"
                value="{{ index .voucher "recipient_name" }}">
        </div>
    </div>

    <!-- Row 4: Reference -->
    <h4 class="section-card-title mt-6">{{ L "cash_voucher.reference" }}</h4>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-group">
            <label class="form-label">{{ L "cash_voucher.reference" }}</label>
            <select name="reference_type" class="form-select">
                {{ $refType := index .voucher "reference_type" }}
                <option value="">-- {{ L "tpl.select" }} --</option>
                <option value="purchase_bill" {{ if eq $refType "purchase_bill" }}selected{{ end }}>{{ L "purchase_bill.type_label" }}</option>
                <option value="bill" {{ if eq $refType "bill" }}selected{{ end }}>{{ L "tpl.invoice.type" }}</option>
                <option value="expense" {{ if eq $refType "expense" }}selected{{ end }}>{{ L "cash_voucher_recipient.other" }}</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">{{ L "cash_voucher.reference" }} #</label>
            <input type="number" name="reference_id" class="form-input" value="{{ index .voucher "reference_id" }}">
        </div>
    </div>

    <!-- Row 5: Description + Note -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
        <div class="form-group">
            <label class="form-label">{{ L "cash_voucher.description" }}</label>
            <textarea name="description" class="form-textarea" rows="2">{{ index .voucher "description" }}</textarea>
        </div>
        <div class="form-group">
            <label class="form-label">{{ L "cash_voucher.note" }}</label>
            <textarea name="note" class="form-textarea" rows="2">{{ index .voucher "note" }}</textarea>
        </div>
    </div>

    <!-- Bank fields -->
    <div id="bank_fields" style="display: none;">
        <h4 class="section-card-title mt-6">{{ L "cash_voucher.bank_name" }}</h4>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="form-group">
                <label class="form-label">{{ L "cash_voucher.bank_name" }}</label>
                <input type="text" name="bank_name" class="form-input" value="{{ index .voucher "bank_name" }}">
            </div>
            <div class="form-group">
                <label class="form-label">{{ L "cash_voucher.bank_account" }}</label>
                <input type="text" name="bank_account" class="form-input" value="{{ index .voucher "bank_account" }}">
            </div>
            <div class="form-group">
                <label class="form-label">{{ L "cash_voucher.transaction_ref" }}</label>
                <input type="text" name="transaction_reference" class="form-input" value="{{ index .voucher "transaction_reference" }}">
            </div>
        </div>
    </div>

    <div class="flex gap-3 mt-6">
        <button type="submit" class="btn btn-filled">{{ L "tpl.save" }}</button>
        <a href="/dashboard/cash-vouchers/{{ .id }}" class="btn btn-tonal">{{ L "tpl.cancel" }}</a>
    </div>
</form>

<script>
function toggleBankFields() {
    var method = document.getElementById('payment_method').value;
    document.getElementById('bank_fields').style.display = (method === 'bank_transfer') ? '' : 'none';
}

function toggleRecipientFields() {
    var type = document.getElementById('recipient_type').value;
    var supplierGroup = document.getElementById('supplier_select_group');
    if (type === 'supplier') {
        supplierGroup.style.display = '';
    } else {
        supplierGroup.style.display = 'none';
        document.getElementById('supplier_select').value = '';
    }
}

function updateRecipientName(select) {
    var option = select.options[select.selectedIndex];
    if (option && option.dataset.name) {
        document.getElementById('recipient_name').value = option.dataset.name;
    }
}

// Initialize on load
toggleBankFields();
toggleRecipientFields();
</script>
{{ end }}
