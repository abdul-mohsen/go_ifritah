version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afrita-go
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Add a reverse proxy
  nginx:
    image: nginx:alpine
    container_name: afrita-nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
