{{ define "content" }}
<div class="page-card">
    <form hx-post="/dashboard/orders/create" hx-target="body" hx-indicator="#submit-spinner">
        <div class="form-group">
            <label class="form-label">{{ L "tpl.order.number" }} <span class="required-mark">*</span></label>
            <input type="text" name="number" placeholder="{{ L "tpl.order.number" }}" class="w-full" required maxlength="50">
        </div>

        <div class="form-group">
            <label class="form-label">{{ L "tpl.order.client" }} <span class="required-mark">*</span></label>
            <input type="text" name="client" placeholder="{{ L "tpl.order.client_name" }}" class="w-full" required minlength="2"
                maxlength="100">
        </div>

        <div class="form-group">
            <label class="form-label">{{ L "tpl.order.total" }} <span class="required-mark">*</span></label>
            <input type="number" step="0.01" name="total" placeholder="0.00" class="w-full" required min="0">
        </div>

        <div class="form-group">
            <label class="form-label">{{ L "tpl.order.status" }}</label>
            <select name="status" class="w-full" required>
                <option value="pending">{{ L "tpl.order.status_pending" }}</option>
                <option value="completed">{{ L "tpl.order.status_completed" }}</option>
                <option value="cancelled">{{ L "tpl.order.status_cancelled" }}</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">{{ L "tpl.order.notes" }}</label>
            <textarea name="notes" rows="3" placeholder="{{ L "tpl.order.notes_placeholder" }}" class="w-full" maxlength="500"></textarea>
        </div>

        {{ template "form-actions" dict "submit_label" (L "tpl.save") "cancel_url" "/dashboard/orders" }}
    </form>
</div>
{{ end }}
