{{/*
form-actions — Submit button + cancel link + HTMX spinner.
Usage: {{ template "form-actions" dict "submit_label" "حفظ" "cancel_url" "/dashboard/clients" }}
*/}}
{{ define "form-actions" }}
<div class="flex gap-3 items-center pt-6">
    <button type="submit" class="btn btn-filled">{{ .submit_label }}</button>
    <a href="{{ .cancel_url }}" class="btn btn-outlined">{{ L "tpl.cancel" }}</a>
    <span id="submit-spinner" class="htmx-indicator" style="color: var(--md-sys-color-primary)">
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" />
            <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
        </svg>
    </span>
</div>
{{ end }}
